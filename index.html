<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church Appointment Tracker</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    margin: 0;
    padding: 20px;
    color: #333;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

h2 {
    margin-top: 40px;
    border-bottom: 2px solid #eef2f3;
    padding-bottom: 10px;
}

form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    background: #eef2f3;
    padding: 20px;
    border-radius: 6px;
    margin-bottom: 40px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full-width {
    grid-column: span 2;
}

input, textarea {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
}

button {
    grid-column: span 2;
    background-color: #2ecc71;
    color: white;
    border: none;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #27ae60;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}

th {
    background-color: #34495e;
    color: white;
}

.delete-btn {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>⛪ Church Appointment Tracker</h1>

<!-- FORM -->
<form id="appointmentForm">

<div class="form-group">
<label>Church Name</label>
<input type="text" id="churchName" required>
</div>

<div class="form-group">
<label>Contact Person</label>
<input type="text" id="contactPerson" required>
</div>

<div class="form-group">
<label>Date & Time</label>
<input type="datetime-local" id="appDate" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="phoneNumber">
</div>

<div class="form-group full-width">
<label>Notes</label>
<textarea id="notes"></textarea>
</div>

<button type="submit">Add Appointment</button>

</form>

<!-- TABLE -->
<h2>Scheduled Meetings</h2>

<table>
<thead>
<tr>
<th>Church</th>
<th>Contact</th>
<th>Date</th>
<th>Phone</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="appointmentTableBody"></tbody>
</table>

</div>

<script>
const form = document.getElementById("appointmentForm");
const tableBody = document.getElementById("appointmentTableBody");

document.addEventListener("DOMContentLoaded", loadAppointments);

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const appointment = {
        id: Date.now(),
        churchName: document.getElementById("churchName").value,
        contactPerson: document.getElementById("contactPerson").value,
        date: document.getElementById("appDate").value,
        phoneNumber: document.getElementById("phoneNumber").value,
        notes: document.getElementById("notes").value
    };

    let data = JSON.parse(localStorage.getItem("appointments")) || [];
    data.push(appointment);
    localStorage.setItem("appointments", JSON.stringify(data));

    form.reset();
    loadAppointments();
});

function loadAppointments() {
    tableBody.innerHTML = "";

    let data = JSON.parse(localStorage.getItem("appointments")) || [];

    data.forEach(app => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${app.churchName}</td>
            <td>${app.contactPerson}</td>
            <td>${app.date}</td>
            <td>${app.phoneNumber || ""}</td>
            <td>${app.notes || ""}</td>
            <td>
                <button class="delete-btn" onclick="deleteApp(${app.id})">
                    Delete
                </button>
            </td>
        `;

        tableBody.appendChild(row);
    });
}

function deleteApp(id) {
    let data = JSON.parse(localStorage.getItem("appointments")) || [];
    data = data.filter(app => app.id !== id);
    localStorage.setItem("appointments", JSON.stringify(data));
    loadAppointments();
}
</script>

</body>
</html>
