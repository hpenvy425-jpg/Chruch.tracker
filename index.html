<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        padding: 20px;
        color: #333;
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
        color: #2c3e50;
        text-align: center;
        margin-bottom: 30px;
    }

    h2 {
        color: #2c3e50;
        margin-top: 40px;
        border-bottom: 2px solid #eef2f3;
        padding-bottom: 10px;
    }

    form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 40px;
        background: #eef2f3;
        padding: 20px;
        border-radius: 6px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group.full-width {
        grid-column: span 2;
    }

    label {
        font-weight: bold;
        margin-bottom: 5px;
        color: #34495e;
        font-size: 14px;
    }

    input,
    textarea {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
    }

    button {
        grid-column: span 2;
        background-color: #2ecc71;
        color: white;
        border: none;
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
    }

    button:hover {
        background-color: #27ae60;
    }

    .calendar-container {
        margin: 20px 0 40px 0;
        background: #fff;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th,
    td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }

    th {
        background-color: #34495e;
        color: white;
    }

    tr:hover {
        background-color: #f9f9f9;
    }

    .delete-btn {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
    }

    .delete-btn:hover {
        background-color: #c0392b;
    }

    @media (max-width: 768px) {
        form {
            grid-template-columns: 1fr;
        }

        .form-group.full-width,
        button {
            grid-column: span 1;
        }

        iframe {
            height: 500px;
        }
    }
</style>

<h1>⛪ Church Appointment Tracker</h1>

<!-- APPOINTMENT FORM -->
<form id="appointmentForm">

    <div class="form-group">
        <label for="churchName">Church Name</label>
        <input type="text" id="churchName" required placeholder="First Baptist Church">
    </div>

    <div class="form-group">
        <label for="contactPerson">Contact Person (Pastor/Tech Lead)</label>
        <input type="text" id="contactPerson" required placeholder="Pastor John Doe">
    </div>

    <div class="form-group">
        <label for="appDate">Date & Time</label>
        <input type="datetime-local" id="appDate" required>
    </div>

    <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input type="tel" id="phoneNumber" placeholder="555-123-4567">
    </div>

    <div class="form-group full-width">
        <label for="notes">Notes / Special Requests</label>
        <textarea id="notes" rows="3" placeholder="Wants 3 cameras and live stream software upgrade..."></textarea>
    </div>

    <button type="submit">Add Appointment & Sync Calendar</button>

</form>

```

</div>

<script>
    const MAKE_WEBHOOK_URL = "PASTE_YOUR_MAKE_WEBHOOK_URL_HERE";

    const form = document.getElementById('appointmentForm');
    const tableBody = document.getElementById('appointmentTableBody');

    document.addEventListener('DOMContentLoaded', displayAppointments);

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const churchName = document.getElementById('churchName').value;
        const contactPerson = document.getElementById('contactPerson').value;
        const appDate = document.getElementById('appDate').value;
        const phoneNumber = document.getElementById('phoneNumber').value;
        const notes = document.getElementById('notes').value;

        const appointment = {
            id: Date.now(),
            churchName,
            contactPerson,
            date: new Date(appDate).toLocaleString(),
            rawDate: appDate,
            phoneNumber,
            notes
        };

        let appointments = JSON.parse(localStorage.getItem('churchApps')) || [];
        appointments.push(appointment);

        localStorage.setItem(
            'churchApps',
            JSON.stringify(appointments)
        );

        if (MAKE_WEBHOOK_URL !== "PASTE_YOUR_MAKE_WEBHOOK_URL_HERE") {
            fetch(MAKE_WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(appointment)
            })
            .then(() => {
                console.log("Successfully synced with Google Calendar");
            })
            .catch(error => {
                console.error("Sync error:", error);
            });
        }

        form.reset();
        displayAppointments();
    });

    function displayAppointments() {

        tableBody.innerHTML = '';

        const appointments =
            JSON.parse(localStorage.getItem('churchApps')) || [];

        appointments.forEach(app => {

            const row = document.createElement('tr');

            row.innerHTML = `
                <td><strong>${app.churchName}</strong></td>
                <td>${app.contactPerson}</td>
                <td>${app.date}</td>
                <td>${app.phoneNumber || 'N/A'}</td>
                <td>${app.notes || 'No notes'}</td>
                <td>
                    <button class="delete-btn"
                        onclick="deleteAppointment(${app.id})">
                        Delete
                    </button>
                </td>
            `;

            tableBody.appendChild(row);
        });
    }

    window.deleteAppointment = function(id) {

        let appointments =
            JSON.parse(localStorage.getItem('churchApps')) || [];

        appointments =
            appointments.filter(app => app.id !== id);

        localStorage.setItem(
            'churchApps',
            JSON.stringify(appointments)
        );

        displayAppointments();
    };
</script>

</body>
